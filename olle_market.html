<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>전세계가 사랑하는 올레시장 맛집</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Hiragino Sans', sans-serif;
      background: #f7f7f7;
      color: #1a1a1a;
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* 언어 선택 */
    .lang-bar {
      background: #111;
      display: flex;
      justify-content: center;
      gap: 4px;
      padding: 8px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .lang-btn {
      background: transparent;
      border: 1px solid #444;
      color: #aaa;
      font-size: 12px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lang-btn.active {
      background: #e85d26;
      border-color: #e85d26;
      color: white;
    }

    header {
      background: #fff;
      padding: 24px 20px 14px;
      border-bottom: 1px solid #eee;
    }
    header .location { font-size: 12px; color: #999; margin-bottom: 4px; }
    header .by { font-size: 12px; color: #999; margin-bottom: 4px; }
    header h1 { font-size: 21px; font-weight: 900; line-height: 1.3; color: #111; }
    header h1 span { color: #e85d26; }
    header .updated { font-size: 11px; color: #bbb; margin-top: 8px; }

    .tabs {
      background: #fff;
      display: flex;
      padding: 0 16px;
      border-bottom: 1px solid #eee;
      gap: 20px;
    }
    .tab {
      font-size: 13px;
      font-weight: 700;
      padding: 12px 0;
      color: #bbb;
      border-bottom: 2px solid transparent;
      cursor: pointer;
    }
    .tab.active { color: #e85d26; border-bottom: 2px solid #e85d26; }

    .rank-list { background: #fff; }

    .rank-item {
      display: flex;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid #f2f2f2;
      gap: 14px;
      text-decoration: none;
      color: inherit;
    }
    .rank-item.top1 { background: #fff9f6; }
    .rank-item.top2 { background: #fdfcfb; }
    .rank-item.top3 { background: #fdfcfb; }

    .rank-num { font-size: 16px; font-weight: 900; min-width: 28px; text-align: center; color: #ccc; }
    .rank-num.gold   { color: #e85d26; font-size: 18px; }
    .rank-num.silver { color: #888;    font-size: 17px; }
    .rank-num.bronze { color: #b07d3a; font-size: 17px; }

    .rank-emoji { font-size: 28px; min-width: 38px; text-align: center; }
    .rank-info { flex: 1; }
    .rank-name { font-size: 15px; font-weight: 700; color: #111; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .rank-desc { font-size: 12px; color: #999; margin-top: 3px; }

    .rank-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; white-space: nowrap; }
    .badge-hot { background: #fff0ec; color: #e85d26; }
    .badge-tv  { background: #f0f4ff; color: #4466ee; }
    .badge-new { background: #f0fff4; color: #22aa55; }

    .rank-change { font-size: 12px; font-weight: 700; min-width: 32px; text-align: right; }
    .up   { color: #22aa55; }
    .down { color: #e84040; }
    .same { color: #ccc; }
    .new-entry { color: #4466ee; font-size: 10px; }

    .hero-row {
      margin: 12px 16px;
      background: linear-gradient(135deg, #e85d26, #c94b1a);
      border-radius: 14px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
    }
    .hero-row .rank-name { color: #fff; font-size: 16px; }
    .hero-row .rank-desc { color: rgba(255,255,255,0.75); }
    .hero-row .rank-change { color: rgba(255,255,255,0.8); }

    /* 새활용 배너 */
    .eco-section {
      margin: 16px;
      background: linear-gradient(135deg, #1b4332, #2d6a4f);
      border-radius: 14px;
      padding: 18px;
      color: white;
    }
    .eco-label { display: inline-block; background: #52b788; color: white; font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; margin-bottom: 10px; }
    .eco-title { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
    .eco-sub { font-size: 11px; opacity: 0.75; margin-bottom: 14px; line-height: 1.5; }
    .eco-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
    .eco-stat { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 10px 4px; text-align: center; }
    .eco-stat .icon { font-size: 20px; display: block; margin-bottom: 4px; }
    .eco-stat .val  { font-size: 13px; font-weight: 800; display: block; }
    .eco-stat .lbl  { font-size: 10px; opacity: 0.7; display: block; margin-top: 2px; line-height: 1.3; }
    .eco-note { font-size: 10px; opacity: 0.55; margin-bottom: 12px; line-height: 1.5; }
    .btn-green { display: block; text-align: center; background: #52b788; color: white; text-decoration: none; font-size: 13px; font-weight: 700; padding: 10px; border-radius: 10px; }

    .market-info { margin: 16px; background: #fff; border-radius: 14px; padding: 16px 18px; border: 1px solid #eee; }
    .market-info .mi-title { font-size: 14px; font-weight: 800; margin-bottom: 8px; color: #333; }
    .market-info .mi-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #666; margin-bottom: 6px; }
    .btn-map { display: block; text-align: center; background: #f5f5f5; color: #333; text-decoration: none; font-size: 13px; font-weight: 700; padding: 10px; border-radius: 10px; margin-top: 12px; }

    footer { text-align: center; padding: 24px 16px; font-size: 11px; color: #ccc; }
  </style>
</head>

function setLang(lang) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[onclick="setLang('${lang}')"]`).classList.add('active');

  const t = i18n[lang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key] !== undefined) {
      el.innerHTML = t[key];
    }
  });
  document.documentElement.lang = lang;
}
